<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configurar martabs</title>
    <link rel="stylesheet" href="./setup.css">
  </head>
  <body>
    <main class="setup-shell">
      <section class="setup-panel">
        <h1>Elegir carpetas</h1>
        <p>Selecciona las carpetas de marcadores que quieres ver en la nueva pestana.</p>
        <div id="folder-list" class="folder-list" aria-live="polite"></div>
        <fieldset>
          <legend>Funciones</legend>
          <label><input id="automatic-tags" type="checkbox" checked> Etiquetas automaticas</label>
          <label><input id="manual-tags" type="checkbox" checked> Etiquetas manuales</label>
          <label><input id="show-pinned-folder" type="checkbox" checked> Mostrar carpeta virtual de "📌 Fijados" al tope de la pagina</label>
          <label><input id="link-health" type="checkbox"> Habilitar revision de enlaces (boton Revisar en cada carpeta)</label>
          <label><input id="preview-capture" type="checkbox"> Capturar previews locales al abrir marcadores</label>
        </fieldset>
        <fieldset>
          <legend>Apariencia</legend>
          <label class="theme-label">
            <span>Modo visual de carpetas (por defecto)</span>
            <select id="default-mode-select">
              <option value="list">Lista completa (Dominio y tags)</option>
              <option value="compact">Lista compacta</option>
              <option value="icons">Grilla de iconos</option>
              <option value="quicklinks">Quicklinks</option>
            </select>
          </label>
          <label class="theme-label">
            <span>Tema de color</span>
            <select id="theme-select">
              <option value="system">Sistema (Automatico)</option>
              <option value="light">Claro</option>
              <option value="dark">Oscuro</option>
            </select>
          </label>
        </fieldset>
        <div class="actions">
          <button id="save" type="button">Guardar configuracion</button>
          <p id="status" role="status"></p>
        </div>
      </section>
    </main>
    <script type="module" src="./setup.js"></script>
  </body>
</html>
