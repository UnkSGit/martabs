<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio - martabs</title>
    <link rel="stylesheet" href="./newtab.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="header-logo-title">
          <span class="logo-wrap">
            <img class="logo-img-header" src="logo.png" alt="martabs">
          </span>
          <p id="status-line">Cargando marcadores...</p>
        </div>
        <button id="settings" type="button" title="Configurar marcadores y preferencias">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Configurar
        </button>
      </header>

      <div class="search-section">
        <label class="search-wrap" for="search">
          <div class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <input id="search" type="search" autocomplete="off" placeholder="Buscar titulo, etiqueta, URL o carpeta...">
        </label>
      </div>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
    <div id="preview-card" class="preview-card" hidden></div>
    <dialog id="edit-modal" class="edit-modal">
      <form id="edit-form" class="edit-form">
        <h3 class="edit-modal-title">Editar Marcador</h3>
        
        <label class="edit-field">
          <span>Nombre</span>
          <input type="text" id="edit-title" required autocomplete="off">
        </label>
        
        <label class="edit-field">
          <span>URL</span>
          <input type="url" id="edit-url" required autocomplete="off">
        </label>
        
        <label class="edit-field">
          <span>Etiquetas (separadas por comas)</span>
          <input type="text" id="edit-tags" placeholder="ej: trabajo, docs, js" autocomplete="off">
        </label>
        
        <div class="edit-actions">
          <button type="button" id="edit-delete" class="danger-button">Eliminar</button>
          <div class="edit-actions-right">
            <button type="button" id="edit-cancel" class="link-action-button">Cancelar</button>
            <button type="submit" id="edit-save" class="primary-button">Guardar</button>
          </div>
        </div>
      </form>
    </dialog>
    <script type="module" src="./newtab.js"></script>
  </body>
</html>
