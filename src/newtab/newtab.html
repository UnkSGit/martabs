<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="newtabTitle">Inicio - martabs</title>
    <script>
      // Early theme detection to minimize visual flash of wrong theme
      (function() {
        try {
          const api = (typeof chrome !== "undefined" && chrome.storage && chrome.storage.local) ? chrome : (typeof browser !== "undefined" && browser.storage && browser.storage.local ? browser : null);
          if (api) {
            const cb = function(data) {
              try {
                const theme = data?.settings?.theme || "system";
                const root = document.documentElement;
                if (theme === "dark") {
                  root.classList.add("theme-dark");
                  root.classList.remove("theme-light");
                } else if (theme === "light") {
                  root.classList.add("theme-light");
                  root.classList.remove("theme-dark");
                }
              } catch (e) {}
            };
            const res = api.storage.local.get("settings", cb);
            if (res && typeof res.then === "function") {
              res.then(cb, function() {});
            }
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="./newtab.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="header-logo-title">
          <span class="logo-wrap">
            <img class="logo-img-header" src="../images/newlogo.png" alt="martabs">
          </span>
          <p id="status-line" data-i18n="loadingBookmarks">Cargando marcadores...</p>
        </div>
        <div class="topbar-actions">
          <button id="settings" type="button" data-i18n-title="settingsBtnTitle" title="Configurar marcadores y preferencias">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span data-i18n="settingsBtn">Configurar</span>
          </button>
        </div>
      </header>

      <div class="search-section">
        <label class="search-wrap" for="search">
          <div class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <input id="search" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" placeholder="Buscar titulo, etiqueta, URL o carpeta...">
        </label>
      </div>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
    <div id="preview-card" class="preview-card" hidden></div>
    <dialog id="edit-modal" class="edit-modal">
      <form id="edit-form" class="edit-form">
        <h3 class="edit-modal-title" data-i18n="editModalTitle">Editar Marcador</h3>
        
        <label class="edit-field">
          <span data-i18n="editFieldName">Nombre</span>
          <input type="text" id="edit-title" required autocomplete="off">
        </label>
        
        <label class="edit-field">
          <span data-i18n="editFieldUrl">URL</span>
          <input type="url" id="edit-url" required autocomplete="off">
        </label>
        
        <label class="edit-field">
          <span data-i18n="editFieldTags">Etiquetas (separadas por comas)</span>
          <input type="text" id="edit-tags" data-i18n-placeholder="editFieldTagsPlaceholder" placeholder="ej: trabajo, docs, js" autocomplete="off">
        </label>
        
        <label class="edit-field">
          <span data-i18n="editFieldFavicon">Icono personalizado (URL de la imagen)</span>
          <input type="url" id="edit-favicon" placeholder="https://ejemplo.com/icono.png" autocomplete="off">
          <span id="edit-favicon-error" class="edit-error" data-i18n="editFaviconError" style="color: var(--warning-text); font-size: 11px; margin-top: 4px; display: none;">La imagen actual no se pudo cargar.</span>
        </label>
        
        <div class="edit-actions">
          <button type="button" id="edit-delete" class="danger-button" data-i18n="delete">Eliminar</button>
          <div class="edit-actions-right">
            <button type="button" id="edit-cancel" class="link-action-button" data-i18n="cancel">Cancelar</button>
            <button type="submit" id="edit-save" class="primary-button" data-i18n="save">Guardar</button>
          </div>
        </div>
      </form>
    </dialog>
    <script type="module" src="./newtab.js"></script>
  </body>
</html>
